<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 실패 - 장령산계곡산장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f7f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.result-box{background:#fff;border-radius:16px;padding:50px 40px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center;max-width:500px;width:100%;margin:20px}
.icon{font-size:4rem;margin-bottom:16px}
h1{color:#991b1b;font-size:1.5rem;margin-bottom:12px}
p{color:#6b7280;margin-bottom:8px;font-size:0.95rem}
.btn{display:inline-block;padding:14px 30px;border-radius:8px;font-weight:500;font-size:0.95rem;margin-top:20px;text-decoration:none;color:#fff;background:#2d6b4a;margin:8px}
</style>
</head>
<body>
<div class="result-box">
  <div class="icon">😔</div>
  <h1>결제가 완료되지 않았습니다</h1>
  <p id="errorMsg"></p>
  <p style="font-size:0.85rem;color:#999;margin-top:12px;">문제가 계속되면 전화(043-733-9615)로 문의해주세요.</p>
  <div>
    <a href="/booking" class="btn">다시 예약하기</a>
    <a href="/" class="btn" style="background:#6b7280;">홈으로</a>
  </div>
</div>
<script>
const params = new URLSearchParams(location.search);
const code = params.get('code');
const message = params.get('message');
document.getElementById('errorMsg').textContent = message || '결제가 취소되었거나 오류가 발생했습니다.';
</script>
</body>
</html>
