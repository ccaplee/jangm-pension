<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>결제 완료 - 장령산계곡산장</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:#f4f7f5;display:flex;align-items:center;justify-content:center;min-height:100vh}
.result-box{background:#fff;border-radius:16px;padding:50px 40px;box-shadow:0 4px 20px rgba(0,0,0,0.08);text-align:center;max-width:500px;width:100%;margin:20px}
.icon{font-size:4rem;margin-bottom:16px}
h1{color:#065f46;font-size:1.5rem;margin-bottom:12px}
p{color:#6b8a70;margin-bottom:8px;font-size:0.95rem}
.info-box{background:#f0faf3;border-radius:10px;padding:20px;margin:24px 0;text-align:left}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:0.9rem}
.btn{display:inline-block;padding:14px 30px;border-radius:8px;font-weight:500;font-size:0.95rem;margin-top:16px;text-decoration:none;color:#fff;background:#2d6b4a}
.btn:hover{background:#1a3c27}
#loading{display:block}
#success{display:none}
#error{display:none}
</style>
</head>
<body>
<div class="result-box">
  <div id="loading">
    <div class="icon">⏳</div>
    <h1>결제 확인 중...</h1>
    <p>잠시만 기다려주세요.</p>
  </div>
  <div id="success">
    <div class="icon">✅</div>
    <h1>예약이 완료되었습니다!</h1>
    <p>감사합니다. 아래 예약 정보를 확인해주세요.</p>
    <div class="info-box" id="reservationInfo"></div>
    <p style="font-size:0.85rem;color:#999;">예약 확인 문자가 발송됩니다.</p>
    <a href="/" class="btn">홈으로 돌아가기</a>
  </div>
  <div id="error">
    <div class="icon">❌</div>
    <h1 id="errorTitle">결제 처리 실패</h1>
    <p id="errorMessage">문제가 발생했습니다.</p>
    <a href="/booking" class="btn" style="background:#dc2626;">다시 시도하기</a>
  </div>
</div>
<script>
async function confirmPayment() {
  const params = new URLSearchParams(location.search);
  const paymentKey = params.get('paymentKey');
  const orderId = params.get('orderId');
  const amount = parseInt(params.get('amount'));

  try {
    const res = await fetch('/api/payment/confirm', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentKey, orderId, amount })
    });
    const data = await res.json();

    if (res.ok) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('success').style.display = 'block';
      document.getElementById('reservationInfo').innerHTML = `
        <div class="info-row"><span>예약번호</span><strong>${data.reservation_no}</strong></div>
        <div class="info-row"><span>결제금액</span><strong>${data.amount.toLocaleString()}원</strong></div>
        <div class="info-row"><span>결제수단</span><span>${data.method}</span></div>
      `;
    } else {
      showError(data.error || '결제 승인에 실패했습니다.');
    }
  } catch (e) {
    showError('서버 연결에 실패했습니다.');
  }
}

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'block';
  document.getElementById('errorMessage').textContent = msg;
}

confirmPayment();
</script>
</body>
</html>
