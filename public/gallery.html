<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;color:#3d2b1f;background:#faf6f0}
a{text-decoration:none;color:inherit}
img{max-width:100%;display:block}
:root{--wood:#5c3a1e;--accent:#c17817;--cream:#faf6f0;--warm:#f5ede0;--text:#4a3728;--text-light:#8a7560}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(250,246,240,0.97);box-shadow:0 2px 20px rgba(0,0,0,0.06);padding:14px 40px;display:flex;justify-content:space-between;align-items:center}
.nav .logo{font-family:'Nanum Myeongjo',serif;font-size:1.3rem;color:var(--wood);font-weight:700}
.nav .back{color:var(--text-light);font-size:0.9rem;display:flex;align-items:center;gap:6px;transition:color 0.3s}
.nav .back:hover{color:var(--accent)}

/* HERO */
.page-hero{padding:100px 20px 40px;text-align:center;background:var(--warm)}
.page-hero h1{font-family:'Nanum Myeongjo',serif;font-size:2.2rem;color:var(--wood);margin-bottom:10px}
.page-hero p{color:var(--text-light);font-size:0.95rem}

/* CATEGORY */
.container{max-width:1200px;margin:0 auto;padding:0 20px}
.category{padding:50px 0}
.category:nth-child(even){background:var(--warm)}
.category:nth-child(odd){background:var(--cream)}
.cat-header{margin-bottom:24px;display:flex;align-items:center;gap:14px}
.cat-header h2{font-family:'Nanum Myeongjo',serif;font-size:1.6rem;color:var(--wood)}
.cat-header .count{background:var(--accent);color:#fff;padding:4px 12px;border-radius:20px;font-size:0.75rem}

/* PHOTO GRID */
.photo-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.photo-grid .photo{border-radius:8px;overflow:hidden;cursor:pointer;position:relative;aspect-ratio:4/3}
.photo-grid .photo img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.photo-grid .photo:hover img{transform:scale(1.06)}

/* LIGHTBOX */
.lightbox{display:none;position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.92);align-items:center;justify-content:center}
.lightbox.active{display:flex}
.lightbox img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px}
.lb-close{position:absolute;top:20px;right:24px;color:#fff;font-size:2rem;cursor:pointer;background:none;border:none;z-index:201}
.lb-prev,.lb-next{position:absolute;top:50%;transform:translateY(-50%);color:#fff;font-size:2.5rem;cursor:pointer;background:rgba(255,255,255,0.1);border:none;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background 0.3s}
.lb-prev{left:20px}
.lb-next{right:20px}
.lb-prev:hover,.lb-next:hover{background:rgba(255,255,255,0.25)}
.lb-info{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.7);font-size:0.85rem;background:rgba(0,0,0,0.4);padding:6px 16px;border-radius:20px}

/* FOOTER */
.footer{background:var(--wood);color:rgba(255,255,255,0.5);padding:30px 0;text-align:center;font-size:0.8rem}
.footer a{color:var(--accent)}

/* FLOATING */
.floating{position:fixed;bottom:24px;right:24px;z-index:90;display:flex;flex-direction:column;gap:10px}
.float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 4px 16px rgba(0,0,0,0.2);border:none;cursor:pointer;transition:transform 0.3s;text-decoration:none}
.float-btn:hover{transform:scale(1.1)}
.fb-phone{background:var(--accent);color:#fff}

@media(max-width:768px){
  .nav{padding:12px 16px}
  .photo-grid{grid-template-columns:repeat(3,1fr);gap:4px}
  .page-hero h1{font-size:1.7rem}
  .cat-header h2{font-size:1.3rem}
  .lb-prev,.lb-next{width:40px;height:40px;font-size:1.8rem}
}
@media(max-width:480px){
  .photo-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

<script>
// Lightbox
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbInfo = document.getElementById('lbInfo');
let allPhotos = [];
let currentIdx = 0;

document.querySelectorAll('.photo-grid').forEach(grid => {
  const category = grid.dataset.category;
  grid.querySelectorAll('.photo img').forEach((img, i) => {
    const globalIdx = allPhotos.length;
    allPhotos.push({ src: img.src, category });
    img.parentElement.addEventListener('click', () => openLightbox(globalIdx));
  });
});

function openLightbox(idx) {
  currentIdx = idx;
  showPhoto();
  lightbox.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function showPhoto() {
  const p = allPhotos[currentIdx];
  lbImg.src = p.src;
  lbInfo.textContent = `${p.category} (${currentIdx + 1} / ${allPhotos.length})`;
}

document.getElementById('lbClose').onclick = () => {
  lightbox.classList.remove('active');
  document.body.style.overflow = '';
};

document.getElementById('lbPrev').onclick = () => {
  currentIdx = (currentIdx - 1 + allPhotos.length) % allPhotos.length;
  showPhoto();
};

document.getElementById('lbNext').onclick = () => {
  currentIdx = (currentIdx + 1) % allPhotos.length;
  showPhoto();
};

lightbox.addEventListener('click', e => {
  if (e.target === lightbox) {
    lightbox.classList.remove('active');
    document.body.style.overflow = '';
  }
});

document.addEventListener('keydown', e => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') { lightbox.classList.remove('active'); document.body.style.overflow = ''; }
  if (e.key === 'ArrowLeft') { currentIdx = (currentIdx - 1 + allPhotos.length) % allPhotos.length; showPhoto(); }
  if (e.key === 'ArrowRight') { currentIdx = (currentIdx + 1) % allPhotos.length; showPhoto(); }
});
</script>
