# ============================================
# 장령산계곡산장 Nginx 설정
# www.jangm.co.kr
# ============================================

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name jangm.co.kr www.jangm.co.kr;
    return 301 https://www.jangm.co.kr$request_uri;
}

# jangm.co.kr → www.jangm.co.kr 리다이렉트
server {
    listen 443 ssl;
    server_name jangm.co.kr;

    # SSL 인증서 (Certbot이 자동 설정)
    ssl_certificate /etc/letsencrypt/live/www.jangm.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.jangm.co.kr/privkey.pem;

    return 301 https://www.jangm.co.kr$request_uri;
}

# 메인 서버 블록
server {
    listen 443 ssl http2;
    server_name www.jangm.co.kr;

    # SSL 설정
    ssl_certificate /etc/letsencrypt/live/www.jangm.co.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.jangm.co.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 로그
    access_log /var/log/nginx/jangm-access.log;
    error_log /var/log/nginx/jangm-error.log;

    # 업로드 최대 크기
    client_max_body_size 50M;

    # 정적 파일 (Nginx가 직접 서빙 → 빠름)
    location /uploads/ {
        alias /var/www/jangm-pension/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        root /var/www/jangm-pension/public;
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri @backend;
    }

    # Node.js 앱으로 프록시
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    location @backend {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # favicon
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
}
